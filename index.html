<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Calculate UK and DE bra sizes from underbust and bust measurements.">
    <meta name="author" content="Detmud and MamsellChaos">

    <title>Bra Size Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
    <link href="css/app.css" rel="stylesheet">
  </head>

  <body>
    <main class="container">
      <header class="pb-2 mb-4 border-bottom">
        <h1 class="display-5">Magic Bra Size Calculator</h1>
      </header>

      <div class="row g-4">
        <section class="col-md-4" aria-labelledby="calculator-heading">
          <h2 class="visually-hidden" id="calculator-heading">Calculator form</h2>
          <form id="braCalculator">
            <div class="mb-3">
              <label class="form-label" for="underbust">Underbust</label>
              <input
                type="number"
                class="form-control form-control-lg"
                id="underbust"
                name="underbust"
                min="0"
                step="0.1"
                placeholder="80"
                required
              >
            </div>
            <div class="mb-3">
              <label class="form-label" for="bust">Bust</label>
              <input
                type="number"
                class="form-control form-control-lg"
                id="bust"
                name="bust"
                min="0"
                step="0.1"
                placeholder="93"
                required
              >
            </div>
            <button id="calc" type="submit" class="btn btn-primary btn-lg w-100">Calculate</button>
          </form>
        </section>

        <section class="col-md-4 calculator-results" aria-live="polite" aria-labelledby="results-heading">
          <h2 class="visually-hidden" id="results-heading">Calculated sizes</h2>
          <p class="h1"><span id="ukSize"><small>UK</small> xx X</span></p>
          <p class="h1"><span id="deSize"><small>DE</small> xx X</span></p>
        </section>

        <aside class="col-md-4">
          <h2 class="h3">FAQ</h2>
          <button type="button" class="btn btn-link p-0 faq-link" data-bs-toggle="modal" data-bs-target="#faq_1">
            Question 1
          </button><br>
          <button type="button" class="btn btn-link p-0 faq-link" data-bs-toggle="modal" data-bs-target="#faq_2">
            Question 2
          </button>

          <h2 class="h3 mt-4">Support</h2>
          <p>
            <a
              class="btn btn-outline-secondary btn-sm"
              href="https://github.com/detmud/bra-calculator/fork"
              target="_blank"
              rel="noopener noreferrer"
            >
              Fork on GitHub
            </a>
          </p>
        </aside>
      </div>

      <hr>
      <p class="text-center">
        by <a href="https://twitter.com/detmud" target="_blank" rel="noopener noreferrer">@Detmud</a>
        &amp; <a href="https://twitter.com/mamsellchaos" target="_blank" rel="noopener noreferrer">@MamsellChaos</a>
      </p>
      <p class="text-center">Version 0.4.0</p>
    </main>

    <div class="modal fade" id="faq_1" tabindex="-1" aria-labelledby="faq_1_label" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h3 class="modal-title fs-5" id="faq_1_label">Question 1</h3>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            ...
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="faq_2" tabindex="-1" aria-labelledby="faq_2_label" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h3 class="modal-title fs-5" id="faq_2_label">Question 2</h3>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            ...
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/calculator-core.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
